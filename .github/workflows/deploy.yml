name: Deploy React to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: lecture1/my-react-app/package-lock.json

      # my-react-app 빌드
      - name: Install dependencies (my-react-app)
        run: npm ci
        working-directory: ./lecture1/my-react-app

      - name: Build (my-react-app)
        run: npm run build
        working-directory: ./lecture1/my-react-app

      # community 빌드
      - name: Install dependencies (community)
        run: npm ci
        working-directory: ./lecture1/community

      - name: Build (community)
        run: npm run build
        working-directory: ./lecture1/community

      # ui_test 빌드
      - name: Install dependencies (ui_test)
        run: npm ci
        working-directory: ./lecture1/ui_test

      - name: Build (ui_test)
        run: npm run build
        working-directory: ./lecture1/ui_test

      # 빌드 결과물 합치기
      - name: Merge build outputs
        run: |
          mkdir -p ./dist
          cp ./index.html ./dist/index.html
          mkdir -p ./dist/react-app
          cp -r ./lecture1/my-react-app/dist/. ./dist/react-app/
          mkdir -p ./dist/community
          cp -r ./lecture1/community/dist/. ./dist/community/
          mkdir -p ./dist/ui-test
          cp -r ./lecture1/ui_test/dist/. ./dist/ui-test/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
